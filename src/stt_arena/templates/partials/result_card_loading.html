>
  <header class="mb-3 flex items-start justify-between gap-3">
    <div>
      <h3 class="text-lg font-medium text-zinc-100">{{ provider.display_name }}</h3>
      <p class="text-xs text-zinc-500">transcribing…</p>

  <div class="space-y-2" aria-hidden="true">

    <div class="h-3 w-5/6 animate-pulse rounded bg-zinc-800"></div>
    <div class="h-3 w-4/6 animate-pulse rounded bg-zinc-800"></div>
  </div>
