<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>stt-arena</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23059669'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='16' fill='white' font-family='system-ui'%3EA%3C/text%3E%3C/svg%3E"
    />
    {% for tag in vite_tags %}
      {% if tag.tag == "link" %}
    <link{% for key, value in tag.attrs.items() %} {{ key }}="{{ value }}"{% endfor %} />
      {% else %}
    <script{% for key, value in tag.attrs.items() %} {{ key }}="{{ value }}"{% endfor %}></script>
      {% endif %}
    {% endfor %}
  </head>
  <body class="font-sans">
    <div class="mx-auto max-w-6xl px-4 py-10">
      <header class="mb-10">
        <p class="text-sm font-medium uppercase tracking-widest text-emerald-400">
          Local-first STT benchmark
        </p>
        <h1 class="mt-2 text-4xl font-semibold tracking-tight text-white">
          stt-arena
        </h1>
        <p class="mt-3 max-w-2xl text-zinc-400">
          Upload audio and compare transcription results across providers in parallel.
        </p>
      </header>

      <section
        class="mb-8 rounded-2xl border border-zinc-800 bg-zinc-900/60 p-6"
        hx-get="/api/providers"
        hx-trigger="load"
        hx-swap="innerHTML"
        id="providers-panel"
      >
        <p class="text-sm text-zinc-500">Loading providers…</p>
      </section>

      <section class="rounded-2xl border border-dashed border-zinc-700 bg-zinc-900/40 p-8">
        <form id="transcribe-form" class="space-y-4">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-zinc-300">Audio file</span>
            <input
              type="file"
              name="file"
              accept="audio/*,.wav,.mp3,.webm,.ogg,.m4a"
              class="block w-full cursor-pointer rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm file:mr-4 file:rounded-md file:border-0 file:bg-emerald-600 file:px-3 file:py-1.5 file:text-sm file:font-medium file:text-white hover:file:bg-emerald-500 disabled:cursor-not-allowed disabled:opacity-60"
              required
            />
          </label>
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-zinc-300">Language (optional)</span>
            <input
              type="text"
              name="language"
              placeholder="en"
              class="block w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-600 disabled:cursor-not-allowed disabled:opacity-60"
            />
          </label>
          <div class="flex items-center gap-3">
            <button
              id="transcribe-submit"
              type="submit"
              class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-500 disabled:cursor-not-allowed disabled:opacity-60"
            >
              Transcribe
            </button>
            <p id="transcribe-indicator" class="text-sm text-zinc-400">
              Transcribing…
            </p>
          </div>
        </form>
      </section>

      <section id="results" class="mt-8 columns-1 gap-4 lg:columns-2 xl:columns-3"></section>
    </div>
  </body>
</html>
