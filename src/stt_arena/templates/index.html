<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STT Arena</title>
    <meta
      name="description"
      content="Compare speech-to-text providers side by side with local audio uploads."
    />
    <meta name="application-name" content="STT Arena" />
    <meta name="theme-color" content="#09090b" />
    <link rel="canonical" href="{{ request.url }}" />
    <meta property="og:title" content="STT Arena" />
    <meta
      property="og:description"
      content="Compare speech-to-text providers side by side with local audio uploads."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ request.url }}" />
    <meta property="og:site_name" content="STT Arena" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="{{ request.url_for('static', path='og.svg') }}" />
    <meta property="og:image:alt" content="STT Arena transcription comparison interface" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="STT Arena" />
    <meta
      name="twitter:description"
      content="Compare speech-to-text providers side by side with local audio uploads."
    />
    <meta name="twitter:image" content="{{ request.url_for('static', path='og.svg') }}" />
    <meta name="twitter:image:alt" content="STT Arena transcription comparison interface" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23059669'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='16' fill='white' font-family='system-ui'%3EA%3C/text%3E%3C/svg%3E"
    />
    {% if is_dev %}
    <script type="module">
      import RefreshRuntime from "{{ vite_origin }}/@react-refresh";
      RefreshRuntime.injectIntoGlobalHook(window);
      window.$RefreshReg$ = () => {};
      window.$RefreshSig$ = () => (type) => type;
      window.__vite_plugin_react_preamble_installed__ = true;
    </script>
    {% endif %}
    {% for tag in vite_tags %}
      {% if tag.tag == "link" %}
    <link{% for key, value in tag.attrs.items() %} {{ key }}="{{ value }}"{% endfor %} />
      {% else %}
    <script{% for key, value in tag.attrs.items() %} {{ key }}="{{ value }}"{% endfor %}></script>
      {% endif %}
    {% endfor %}
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
