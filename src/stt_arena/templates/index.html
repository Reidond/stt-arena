<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>stt-arena</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23059669'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='16' fill='white' font-family='system-ui'%3EA%3C/text%3E%3C/svg%3E"
    />
    {% if is_dev %}
    <script type="module">
      import RefreshRuntime from "{{ vite_origin }}/@react-refresh";
      RefreshRuntime.injectIntoGlobalHook(window);
      window.$RefreshReg$ = () => {};
      window.$RefreshSig$ = () => (type) => type;
      window.__vite_plugin_react_preamble_installed__ = true;
    </script>
    {% endif %}
    {% for tag in vite_tags %}
      {% if tag.tag == "link" %}
    <link{% for key, value in tag.attrs.items() %} {{ key }}="{{ value }}"{% endfor %} />
      {% else %}
    <script{% for key, value in tag.attrs.items() %} {{ key }}="{{ value }}"{% endfor %}></script>
      {% endif %}
    {% endfor %}
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
