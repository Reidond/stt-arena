[project]
name = "stt-arena-tooling"
version = "0.1.0"
description = "Development and build commands for STT Arena"
requires-python = ">=3.13"
dependencies = [
    "pydantic-settings>=2.14.1",
    "stt-arena-vite",
    "uvicorn>=0.48.0",
]

[project.scripts]
dev = "stt_arena_tooling.dev:main"
build = "stt_arena_tooling.build:main"
start = "stt_arena_tooling.start:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stt_arena_tooling"]

[tool.uv.sources]
stt-arena-vite = { workspace = true }
