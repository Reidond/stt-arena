[project]
name = "stt-arena-providers"
version = "0.1.0"
description = "Speech-to-text provider adapters and orchestration for STT Arena"
requires-python = ">=3.13"
dependencies = [
    "deepgram-sdk>=7.2.0",
    "google-cloud-speech>=2.39.0",
    "google-cloud-storage>=3.1.0",
    "httpx>=0.28.1",
    "pydantic>=2.12.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stt_arena_providers"]
